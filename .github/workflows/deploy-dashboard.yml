name: Build and Deploy Dashboard to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Dashboard Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci

      - name: Build frontend
        run: |
          npm run build

      - name: Check build output
        run: |
          echo "Checking build folder..."
          ls -la build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/eventuna_key
          chmod 600 ~/.ssh/eventuna_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy build to EC2
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/eventuna_key" ./build/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/eventuna-dashboard/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/eventuna_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo nginx -t && sudo systemctl reload nginx"